<!DOCTYPE html>
<html lang="en">
вҖҸ<head>
вҖҸ<meta charset="UTF-8">
вҖҸ<title>Histology Exam</title>

вҖҸ<style>
вҖҸbody{
вҖҸfont-family:Arial;
вҖҸbackground:#0f172a;
вҖҸcolor:white;
вҖҸtext-align:center;
вҖҸmargin:0;
}

вҖҸ.container{
вҖҸmax-width:700px;
вҖҸmargin:auto;
вҖҸpadding:20px;
}

вҖҸ.card{
вҖҸbackground:#1e293b;
вҖҸpadding:20px;
вҖҸborder-radius:15px;
вҖҸmargin-top:20px;
}

вҖҸimg{
вҖҸwidth:100%;
вҖҸborder-radius:10px;
}

вҖҸinput{
вҖҸwidth:90%;
вҖҸpadding:10px;
вҖҸmargin-top:10px;
вҖҸborder-radius:8px;
вҖҸborder:none;
}

вҖҸbutton{
вҖҸpadding:10px 20px;
вҖҸmargin-top:10px;
вҖҸborder:none;
вҖҸborder-radius:8px;
вҖҸcursor:pointer;
вҖҸbackground:#38bdf8;
вҖҸfont-weight:bold;
}

вҖҸ.timer{
вҖҸfont-size:20px;
вҖҸcolor:#facc15;
}

вҖҸ.hidden{display:none;}
вҖҸ</style>
вҖҸ</head>

вҖҸ<body>

вҖҸ<div class="container">

вҖҸ<h1>Histology Exam</h1>
вҖҸ<div class="timer" id="timer">05:00</div>

вҖҸ<div class="card" id="examBox">

вҖҸ<img id="slideImg">
вҖҸ<br>

вҖҸ<input id="answer" placeholder="Type exact name...">
вҖҸ<br>

вҖҸ<button onclick="check()">Submit</button>

вҖҸ</div>

вҖҸ<div class="card hidden" id="resultBox"></div>

вҖҸ</div>

вҖҸ<script>

/*
рҹ‘ү ЩҮЩҶШ§ ШӘШӯШ· 55 ШіЩ„Ш§ЩҠШҜ
*/
вҖҸconst slides = [
вҖҸ{img:"1.jpg", name:"Slide 1"},
вҖҸ{img:"2.jpg", name:"Slide 2"},
вҖҸ{img:"3.jpg", name:"Slide 3"},

// ЩғЩ…Щ„ Щ„ШӯШҜ 55
вҖҸ// {img:"55.jpg", name:"Slide 55"}
];

вҖҸlet current = 0;
вҖҸlet score = 0;
вҖҸlet wrong = [];

вҖҸfunction loadSlide(){
вҖҸdocument.getElementById("slideImg").src = slides[current].img;
вҖҸdocument.getElementById("answer").value = "";
}

вҖҸfunction check(){

вҖҸlet v = document.getElementById("answer").value;

вҖҸ// вқ— exact match (ШӯШұЩҒ ШЁШӯШұЩҒ)
вҖҸif(v === slides[current].name){
вҖҸscore++;
вҖҸ} else {
вҖҸwrong.push({
вҖҸgiven:v,
вҖҸcorrect:slides[current].name
});
}

вҖҸcurrent++;

вҖҸif(current < slides.length){
вҖҸloadSlide();
вҖҸ} else {
вҖҸshowResult();
}
}

вҖҸfunction showResult(){
вҖҸdocument.getElementById("examBox").classList.add("hidden");
вҖҸdocument.getElementById("resultBox").classList.remove("hidden");

вҖҸlet html = `<h2>Result</h2>`;
вҖҸhtml += `<p>Score: ${score} / ${slides.length}</p>`;

вҖҸif(wrong.length > 0){
вҖҸhtml += "<h3>Mistakes:</h3>";
вҖҸwrong.forEach(w=>{
вҖҸhtml += `<p>вқҢ You: ${w.given}<br>вң… Correct: ${w.correct}</p>`;
});
}

вҖҸdocument.getElementById("resultBox").innerHTML = html;
}

вҖҸ// TIMER (5 minutes)
вҖҸlet time = 300;

вҖҸsetInterval(()=>{
вҖҸlet m = Math.floor(time/60);
вҖҸlet s = time%60;

вҖҸdocument.getElementById("timer").innerText =
вҖҸ`${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

вҖҸtime--;

вҖҸif(time < 0){
вҖҸshowResult();
}
},1000);

вҖҸloadSlide();

вҖҸ</script>

вҖҸ</body>
вҖҸ</html>
